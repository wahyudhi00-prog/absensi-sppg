<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin SPPG - Konfigurasi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <!-- LAYAR LOGIN PIN -->
  <div id="admin-login-screen" class="fixed inset-0 bg-slate-900 z-[999] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl text-center">
      <div class="mx-auto w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mb-4">
        <i data-lucide="shield-check" class="w-6 h-6"></i>
      </div>
      <h3 class="font-extrabold text-slate-800 text-lg">Panel Akses Admin</h3>
      <p class="text-xs text-slate-500 mb-6">Masukkan PIN keamanan untuk melanjutkan</p>
      <input type="password" id="input-pin" placeholder="PIN Admin (1234)" class="w-full text-center py-3 bg-slate-100 border border-slate-200 rounded-xl text-sm font-extrabold tracking-widest focus:outline-none focus:ring-2 focus:ring-emerald-500">
      <button onclick="checkAdminLogin()" class="w-full mt-4 py-3 bg-slate-800 text-white font-bold text-xs rounded-xl hover:bg-slate-900 transition">Buka Kunci</button>
    </div>
  </div>

  <!-- ISI UTAMA PANEL -->
  <div id="admin-dashboard-area" class="hidden min-h-screen pb-10">
    <header class="bg-slate-800 text-white shadow-lg sticky top-0 z-40">
      <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-sm font-extrabold tracking-tight">KONTROL ADMIN SPPG</h1>
        <button onclick="location.reload()" class="p-2 bg-slate-700 rounded-lg hover:bg-slate-600">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        </button>
      </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-6 space-y-6">
      
      <!-- PENGATURAN GEOLOKASI -->
      <section class="bg-white rounded-2xl shadow-sm p-5 border border-slate-100">
        <h2 class="font-bold text-slate-800 text-sm flex items-center gap-2 mb-4">
          <i data-lucide="map-pin" class="text-emerald-500 w-4 h-4"></i> Lokasi Geofencing Dapur
        </h2>
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label class="text-[9px] font-bold text-slate-400 uppercase">Latitude</label>
            <input type="number" step="0.000001" id="config-lat" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold">
          </div>
          <div>
            <label class="text-[9px] font-bold text-slate-400 uppercase">Longitude</label>
            <input type="number" step="0.000001" id="config-lng" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold">
          </div>
        </div>
        <div>
          <label class="text-[9px] font-bold text-slate-400 uppercase">Radius (Meter)</label>
          <input type="number" id="config-radius" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold">
        </div>
        <button onclick="saveLocationConfig()" class="w-full mt-4 py-3 bg-emerald-600 text-white font-bold text-xs rounded-xl hover:bg-emerald-700 transition flex items-center justify-center gap-2">
          <i data-lucide="save" class="w-4 h-4"></i> Simpan Lokasi Dapur
        </button>
      </section>
      
      <!-- TAMBAH RELAWAN -->
      <section class="bg-white rounded-2xl shadow-sm p-5 border border-slate-100">
        <h2 class="font-bold text-slate-800 text-sm mb-4">Tambah Relawan Baru</h2>
        <div class="space-y-3">
          <input type="text" id="new-karyawan-id" placeholder="ID (Contoh: SPPG-006)" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold">
          <input type="text" id="new-karyawan-nama" placeholder="Nama Lengkap" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold">
          <select id="new-karyawan-divisi" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold">
            <option value="Pengolahan">Pengolahan</option>
            <option value="Pemorsian">Pemorsian</option>
            <option value="Distribusi">Distribusi</option>
            <option value="Persiapan">Persiapan</option>
          </select>
        </div>
        <button onclick="addKaryawanManual()" class="w-full mt-4 py-3 bg-slate-800 text-white font-bold text-xs rounded-xl hover:bg-slate-900 transition">Tambah Relawan</button>
      </section>

    </main>
  </div>

  <script>
    // Inisialisasi Data
    let databaseKaryawan = JSON.parse(localStorage.getItem('sppg_db_karyawan')) || {};
    
    function checkAdminLogin() {
      if(document.getElementById('input-pin').value === "1234") {
        document.getElementById('admin-login-screen').classList.add('hidden');
        document.getElementById('admin-dashboard-area').classList.remove('hidden');
        lucide.createIcons();
        loadInputs();
      } else { alert("PIN Salah!"); }
    }

    function loadInputs() {
      document.getElementById('config-lat').value = localStorage.getItem('sppg_office_lat') || -6.200000;
      document.getElementById('config-lng').value = localStorage.getItem('sppg_office_lng') || 106.816666;
      document.getElementById('config-radius').value = localStorage.getItem('sppg_office_radius') || 50;
    }

    function saveLocationConfig() {
      const lat = document.getElementById('config-lat').value;
      const lng = document.getElementById('config-lng').value;
      const rad = document.getElementById('config-radius').value;

      localStorage.setItem('sppg_office_lat', lat);
      localStorage.setItem('sppg_office_lng', lng);
      localStorage.setItem('sppg_office_radius', rad);
      
      alert("Lokasi berhasil disimpan! Halaman relawan akan mengikuti koordinat ini.");
    }

    function addKaryawanManual() {
      const id = document.getElementById('new-karyawan-id').value;
      const nama = document.getElementById('new-karyawan-nama').value;
      const divisi = document.getElementById('new-karyawan-divisi').value;
      
      if(!id || !nama) return alert("Isi semua data!");
      
      databaseKaryawan[id] = { nama, divisi };
      localStorage.setItem('sppg_db_karyawan', JSON.stringify(databaseKaryawan));
      
      // Reset form
      document.getElementById('new-karyawan-id').value = "";
      document.getElementById('new-karyawan-nama').value = "";
      alert("Relawan " + nama + " berhasil ditambahkan!");
    }
  </script>
</body>
</html>
